# ============================================
# CI/CD — Build, Push & Deploy (GitOps)
# ============================================
# On push to main:
#   1. Detects which service changed (gateway/identity)
#   2. Builds & pushes Docker image to GHCR
#   3. Updates image tag in kynsoft-gitops
#   4. ArgoCD syncs the cluster automatically
# ============================================

name: Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - 'gateway/**'
      - 'identity/**'
      - 'share/**'
      - 'pom.xml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Detect which services changed
  # ============================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      identity: ${{ steps.filter.outputs.identity }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'gateway/**'
              - 'share/**'
              - 'pom.xml'
              - '.github/workflows/docker-build.yml'
            identity:
              - 'identity/**'
              - 'share/**'
              - 'pom.xml'
              - '.github/workflows/docker-build.yml'

  # ============================================
  # Gateway: Build → Push → Deploy
  # ============================================
  gateway-build:
    name: Gateway - Build & Push
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/smartpayut-gateway-dev:latest
            ghcr.io/${{ github.repository_owner }}/smartpayut-gateway-dev:${{ github.sha }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  gateway-deploy:
    name: Gateway - Deploy
    needs: gateway-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: kmontes198910/kynsoft-gitops
          ssh-key: ${{ secrets.GITOPS_DEPLOY_KEY }}
          ref: main

      - name: Update image tag in manifest
        run: |
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/smartpayut-gateway-dev:.*|image: ghcr.io/${{ github.repository_owner }}/smartpayut-gateway-dev:${{ github.sha }}|" \
            environments/dev/smartpayut-dev/deployments/smartpayut-gateway.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/dev/smartpayut-dev/deployments/smartpayut-gateway.yaml
          git diff --cached --quiet || git commit -m "deploy(smartpayut-gateway): update image to ${{ github.sha }}"
          git pull --rebase
          git push

  gateway-cleanup:
    name: Gateway - Cleanup Images
    needs: gateway-deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      packages: write
    steps:
      - name: Delete old image versions (keep last 3)
        uses: actions/delete-package-versions@v5
        with:
          package-name: smartpayut-gateway-dev
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: false

  # ============================================
  # Identity: Build → Push → Deploy
  # ============================================
  identity-build:
    name: Identity - Build & Push
    needs: changes
    if: needs.changes.outputs.identity == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: identity/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/smartpayut-identity-dev:latest
            ghcr.io/${{ github.repository_owner }}/smartpayut-identity-dev:${{ github.sha }}
          cache-from: type=gha,scope=identity
          cache-to: type=gha,mode=max,scope=identity

  identity-deploy:
    name: Identity - Deploy
    needs: identity-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: kmontes198910/kynsoft-gitops
          ssh-key: ${{ secrets.GITOPS_DEPLOY_KEY }}
          ref: main

      - name: Update image tag in manifest
        run: |
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/smartpayut-identity-dev:.*|image: ghcr.io/${{ github.repository_owner }}/smartpayut-identity-dev:${{ github.sha }}|" \
            environments/dev/smartpayut-dev/deployments/smartpayut-identity.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/dev/smartpayut-dev/deployments/smartpayut-identity.yaml
          git diff --cached --quiet || git commit -m "deploy(smartpayut-identity): update image to ${{ github.sha }}"
          git pull --rebase
          git push

  identity-cleanup:
    name: Identity - Cleanup Images
    needs: identity-deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      packages: write
    steps:
      - name: Delete old image versions (keep last 3)
        uses: actions/delete-package-versions@v5
        with:
          package-name: smartpayut-identity-dev
          package-type: container
          min-versions-to-keep: 3
          delete-only-untagged-versions: false
