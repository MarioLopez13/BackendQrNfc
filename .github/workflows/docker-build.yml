# ============================================
# CI — Build & Push to GHCR
# ============================================
# On push to main/dev:
#   1. Detects which service changed (gateway/identity)
#   2. Builds & pushes Docker image to GHCR
# ============================================

name: Build & Push

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - 'gateway/**'
      - 'identity/**'
      - 'share/**'
      - 'pom.xml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Detect which services changed
  # ============================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      identity: ${{ steps.filter.outputs.identity }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'gateway/**'
              - 'share/**'
              - 'pom.xml'
            identity:
              - 'identity/**'
              - 'share/**'
              - 'pom.xml'

  # ============================================
  # Gateway: Build & Push
  # ============================================
  gateway-build:
    name: Gateway - Build & Push
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/smartpayut-gateway-dev:latest
            ghcr.io/${{ env.OWNER }}/smartpayut-gateway-dev:${{ github.sha }}
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  # ============================================
  # Identity: Build & Push
  # ============================================
  identity-build:
    name: Identity - Build & Push
    needs: changes
    if: needs.changes.outputs.identity == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: identity/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/smartpayut-identity-dev:latest
            ghcr.io/${{ env.OWNER }}/smartpayut-identity-dev:${{ github.sha }}
          cache-from: type=gha,scope=identity
          cache-to: type=gha,mode=max,scope=identity
