spring.application.name=gateway
spring.profiles.active=${RC_ACTIVE_PROFILE:default}

# =================================
# SERVER
# =================================
server.port=${SERVER_PORT:8080}

# Disable Eureka
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# =================================
# SERVICES URLs
# =================================
services.identity.url=${IDENTITY_SERVICE_URL:http://localhost:9909}

# =================================
# KEYCLOAK / JWT
# =================================
url-validation=${KEYCLOAK_REALM_URL:http://localhost:8180/realms/smartpayut}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8180/realms/smartpayut}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://localhost:8180/realms/smartpayut/protocol/openid-connect/certs}
# HTTP Client Configuration - Timeouts
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=30s

# HTTP Client Connection Pool
spring.cloud.gateway.httpclient.pool.type=elastic
spring.cloud.gateway.httpclient.pool.max-connections=500
spring.cloud.gateway.httpclient.pool.max-idle-time=30s
spring.cloud.gateway.httpclient.pool.max-life-time=60s
# WebFlux Configuration
spring.webflux.timeout=30s
# ============================================
# Java 21 Virtual Threads Configuration
# ============================================
# NOTA: Spring Cloud Gateway usa WebFlux (reactivo), por lo que Virtual Threads
# tienen un impacto limitado. Son más beneficiosos en aplicaciones blocking I/O.
# Se mantiene deshabilitado por defecto.
spring.threads.virtual.enabled=false

# Para habilitar en el futuro (después de testing):
# spring.threads.virtual.enabled=true

# Logging para debugging de Virtual Threads (solo si se habilitan)
# logging.level.jdk.VirtualThreadPinned=DEBUG
# Prometheus Metrics Configuration
management.endpoints.web.exposure.include=health,info,prometheus,jwt-cache
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# ============================================
# JWT Token Cache Configuration (Caffeine)
# ============================================
# Habilita/deshabilita el cache de tokens JWT validados
gateway.jwt-cache.enabled=true
# Numero maximo de tokens a almacenar en cache
gateway.jwt-cache.max-size=10000
# Tiempo maximo en minutos que un token permanece en cache
# El TTL real sera el minimo entre este valor y el tiempo de expiracion del token
gateway.jwt-cache.expire-after-write-minutes=5
