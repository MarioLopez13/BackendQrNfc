spring.application.name=identity
spring.profiles.active=${RC_ACTIVE_PROFILE:default}

# App version
app.version=${APP_VERSION:1.0.0}

# Configuración para compilación nativa
spring.aot.enabled=true
spring.native.remove-yaml-support=false
spring.native.remove-jmx-support=false

# Permitir sobrescritura de beans (necesario para RabbitMQ configs)
spring.main.allow-bean-definition-overriding=true
# CQRS Cache
mediator.cache.enabled=true
# Mediator Cache Cleanup
mediator.cache.cleanup.enabled=true
mediator.cache.cleanup.interval=7200000
mediator.cache.cleanup.check-active=true
# Spring Boot dev tools para reinicio rápido
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=1000ms
spring.devtools.restart.quiet-period=500ms

# ===================================================================
# HTTP CLIENT CONFIGURATION - RESTTEMPLATE CONNECTION POOLING
# ===================================================================
# Optimización de comunicación HTTP con servicios externos

# Connection Pool Configuration
rest.http.pool.max-total=200
rest.http.pool.default-max-per-route=50

# Timeout Configuration (milliseconds)
rest.http.timeout.connection=10000
rest.http.timeout.request=10000
rest.http.timeout.socket=30000

# Spring MVC Async Request Timeout (60 seconds)
spring.mvc.async.request-timeout=60000

# =================================
# HIKARI CONNECTION POOL - Using defaults
# =================================
# HikariCP defaults (maximum-pool-size=10) are optimal for most cases.
# Only override if metrics show connection contention.

# Read pool should be read-only
spring.read-datasource.hikari.read-only=true

# =================================
# PRODUCTION BATCH PROCESSING
# =================================
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Disable debugging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false
logging.level.com.zaxxer.hikari=WARN

# Hibernate DDL - auto-update schema for development
spring.jpa.hibernate.ddl-auto=update

# =================================
# SERVER
# =================================
server.port=${SERVER_PORT:9909}

# =================================
# DATASOURCE (Write - Primary)
# =================================
spring.datasource.url=${WRITE_DB_URL:jdbc:postgresql://localhost:5431/smartpayut?currentSchema=identity}
spring.datasource.username=${WRITE_DB_USER:postgres}
spring.datasource.password=${WRITE_DB_PASS:toor}
spring.datasource.driver-class-name=org.postgresql.Driver

# =================================
# DATASOURCE (Read - Replica)
# =================================
spring.read-datasource.url=${READ_DB_URL:jdbc:postgresql://localhost:5431/smartpayut?currentSchema=identity}
spring.read-datasource.username=${READ_DB_USER:postgres}
spring.read-datasource.password=${READ_DB_PASS:toor}
spring.read-datasource.driver-class-name=org.postgresql.Driver

# =================================
# REDIS
# =================================
spring.data.redis.host=${REDIS_ADDRESS:localhost}
spring.data.redis.port=${REDIS_PORT:6380}
spring.data.redis.password=${REDIS_PASSWORD:12345}

# =================================
# RABBITMQ
# =================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5673}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# =================================
# KEYCLOAK PROVIDER
# =================================
keycloak.provider.server-url=${KEYCLOAK_SERVER_URL:http://localhost:8180}
keycloak.provider.realm-name=${KEYCLOAK_REALM:smartpayut}
keycloak.provider.realm-master=${KEYCLOAK_REALM_MASTER:master}
keycloak.provider.admin-clic=${KEYCLOAK_ADMIN_CLIENT:admin-cli}
keycloak.provider.user-console=${KEYCLOAK_ADMIN_USER:admin}
keycloak.provider.password-console=${KEYCLOAK_ADMIN_PASS:admin}
keycloak.provider.client-secret=${KEYCLOAK_CLIENT_SECRET:smartpayut-identity-secret}
keycloak.provider.client-id=${KEYCLOAK_CLIENT_ID:smartpayut-identity}
keycloak.provider.grant-type=${KEYCLOAK_GRANT_TYPE:password}

# =================================
# OAUTH2 / JWT
# =================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8180/realms/smartpayut}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK_SET_URI:http://localhost:8180/realms/smartpayut/protocol/openid-connect/certs}
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_TOKEN_URI:http://localhost:8180/realms/smartpayut/protocol/openid-connect/token}

# Prometheus Metrics Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

