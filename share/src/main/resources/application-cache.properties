# =================================
# MEDIATOR CACHE CONFIGURATION
# =================================

# Habilitar cache de handlers en el Mediator
# Mejora significativa de performance al evitar búsquedas repetidas de handlers
mediator.cache.enabled=true

# Nivel de logging para el Mediator cache
logging.level.com.kynsof.share.core.infrastructure.bus.CachedMediatorImpl=INFO

# =================================
# PERFORMANCE MONITORING
# =================================

# Habilitar métricas de performance del Mediator
management.endpoints.web.exposure.include=health,info,metrics,mediator

# Configurar el endpoint de métricas del cache
management.endpoint.mediator.enabled=true
