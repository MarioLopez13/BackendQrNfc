# =================================
# MEDIATOR CACHE - CONFIGURACIÓN POR DEFECTO
# =================================
# Los microservicios pueden sobrescribir estas propiedades en sus application.properties

# Cache del mediator (deshabilitado por defecto para compatibilidad)
mediator.cache.enabled=false

# Configuración de limpieza automática
mediator.cache.cleanup.enabled=true
mediator.cache.cleanup.interval=21600000
mediator.cache.cleanup.daily-cron=0 0 3 * * *

# Logging
logging.level.com.kynsof.share.core.infrastructure.bus.CachedMediatorImpl=INFO
logging.level.com.kynsof.share.core.infrastructure.bus.MediatorCacheCleanupService=INFO

# Prometheus Metrics Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

